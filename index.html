<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>POISE — Daily Balance Puzzle</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #0f0e0c;
  color: #e8e4dc;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 14px;
}

/* ── Header ── */
#header {
  padding: 16px 0 6px;
  text-align: center;
  flex-shrink: 0;
}
#title {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 12px;
  text-transform: uppercase;
  color: #e8e4dc;
}
#subtitle {
  font-size: 11px;
  color: #484848;
  letter-spacing: 2px;
  margin-top: 5px;
  text-transform: uppercase;
}

/* ── Scale ── */
#scale-wrap {
  height: 96px;
  position: relative;
  flex-shrink: 0;
}
#beam {
  position: absolute;
  bottom: 22px;
  left: 8%;
  width: 84%;
  height: 5px;
  background: linear-gradient(90deg, #4a4a4a, #999, #4a4a4a);
  border-radius: 3px;
  transform-origin: 50% 50%;
}
#hook-l, #hook-r {
  position: absolute;
  top: 5px;
  width: 3px;
  height: 26px;
  background: #555;
  border-radius: 1px;
}
#hook-l { left: 0; transform: translateX(-50%); }
#hook-r { right: 0; transform: translateX(50%); }

#fulcrum-dot {
  position: absolute;
  bottom: 44px;
  left: 50%;
  transform: translateX(-50%);
  width: 13px;
  height: 13px;
  background: #888;
  border-radius: 50%;
  z-index: 2;
}
#fulcrum-post {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 50px;
  background: #444;
  border-radius: 2px;
}
#base-bar {
  position: absolute;
  bottom: 0;
  left: 22%;
  right: 22%;
  height: 3px;
  background: #2e2e2e;
  border-radius: 2px;
}

/* beam animations — no translateX needed since positioned with left/width */
@keyframes beam-win {
  0%   { transform: rotate(0deg); }
  12%  { transform: rotate(8deg); }
  26%  { transform: rotate(-7deg); }
  40%  { transform: rotate(5deg); }
  54%  { transform: rotate(-3deg); }
  68%  { transform: rotate(1.5deg); }
  82%  { transform: rotate(-0.5deg); }
  100% { transform: rotate(0deg); }
}
@keyframes beam-left {
  0%   { transform: rotate(0deg); }
  45%  { transform: rotate(12deg); }
  72%  { transform: rotate(8.5deg); }
  100% { transform: rotate(9deg); }
}
@keyframes beam-right {
  0%   { transform: rotate(0deg); }
  45%  { transform: rotate(-12deg); }
  72%  { transform: rotate(-8.5deg); }
  100% { transform: rotate(-9deg); }
}
.anim-win   { animation: beam-win  1.5s ease-out forwards; }
.anim-left  { animation: beam-left 0.8s ease-out forwards; }
.anim-right { animation: beam-right 0.8s ease-out forwards; }

/* ── Drop zones ── */
#zones {
  display: flex;
  gap: 10px;
  flex: 1;
  min-height: 0;
  margin-bottom: 10px;
}
.zone {
  flex: 1;
  border: 1.5px dashed #252525;
  border-radius: 10px;
  position: relative;
  transition: border-color .15s, background .15s;
  overflow: hidden;
}
.zone.over {
  border-color: #555;
  background: rgba(255,255,255,0.025);
}
.zone-lbl {
  position: absolute;
  bottom: 8px;
  width: 100%;
  text-align: center;
  font-size: 10px;
  letter-spacing: 2.5px;
  color: #2e2e2e;
  text-transform: uppercase;
  pointer-events: none;
}
.zone-cnt {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 11px;
  color: #363636;
}

/* ── Staging ── */
#staging {
  height: 118px;
  flex-shrink: 0;
  border: 1.5px dashed #1e1e1e;
  border-radius: 10px;
  position: relative;
  margin-bottom: 10px;
  transition: border-color .2s;
}
#staging-lbl {
  position: absolute;
  top: 6px;
  width: 100%;
  text-align: center;
  font-size: 10px;
  letter-spacing: 2px;
  color: #2a2a2a;
  text-transform: uppercase;
  pointer-events: none;
}

/* ── Weigh button ── */
#weigh-btn {
  height: 50px;
  flex-shrink: 0;
  margin-bottom: 14px;
  width: 100%;
  background: transparent;
  border: 1.5px solid #252525;
  border-radius: 8px;
  color: #3a3a3a;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 5px;
  text-transform: uppercase;
  cursor: not-allowed;
  transition: border-color .2s, color .2s, box-shadow .2s;
}
@keyframes pulse-btn {
  0%, 100% { border-color: #777; box-shadow: none; }
  50% { border-color: #bbb; box-shadow: 0 0 14px rgba(200,196,188,.15); }
}
#weigh-btn.ready {
  color: #e8e4dc;
  cursor: pointer;
  animation: pulse-btn 2.2s ease-in-out infinite;
}
#weigh-btn.ready:active { background: #181816; }

/* ── Balls ── */
.ball {
  position: fixed;
  border-radius: 50%;
  cursor: grab;
  z-index: 10;
  will-change: left, top;
}
.ball.dragging {
  cursor: grabbing;
  z-index: 99;
  filter: brightness(1.2);
  transition: none;
}
.ball.locked { cursor: default; pointer-events: none; }

/* ── Result overlay ── */
#result {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(8, 8, 6, 0.93);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 28px;
  text-align: center;
}
#result.show { display: flex; }

#r-icon { font-size: 58px; margin-bottom: 22px; }
@keyframes icon-pulse { 0%,100%{opacity:.75;transform:scale(1)} 50%{opacity:1;transform:scale(1.08)} }
#result.win #r-icon { animation: icon-pulse 2.2s ease-in-out infinite; }

#r-title {
  font-size: 23px;
  font-weight: 900;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
#r-msg { font-size: 15px; color: #777; margin-bottom: 36px; line-height: 1.5; }

#share-btn {
  padding: 14px 44px;
  background: #e8e4dc;
  color: #0f0e0c;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  margin-bottom: 12px;
  transition: background .15s;
}
#share-btn:active { background: #c8c4bc; }

#copy-msg {
  font-size: 12px;
  color: #555;
  height: 18px;
  margin-bottom: 30px;
}
#next-lbl {
  font-size: 10px;
  color: #3e3e3e;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
#countdown {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 4px;
  color: #5a5a5a;
  font-variant-numeric: tabular-nums;
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="title">POISE</div>
    <div id="subtitle">#1 · DAILY BALANCE PUZZLE</div>
  </div>

  <div id="scale-wrap">
    <div id="beam">
      <div id="hook-l"></div>
      <div id="hook-r"></div>
    </div>
    <div id="fulcrum-dot"></div>
    <div id="fulcrum-post"></div>
    <div id="base-bar"></div>
  </div>

  <div id="zones">
    <div class="zone" id="zone-l">
      <span class="zone-cnt" id="cnt-l">0 / 5</span>
      <span class="zone-lbl">LEFT</span>
    </div>
    <div class="zone" id="zone-r">
      <span class="zone-cnt" id="cnt-r">0 / 5</span>
      <span class="zone-lbl">RIGHT</span>
    </div>
  </div>

  <div id="staging">
    <span id="staging-lbl">STAGING AREA</span>
  </div>

  <button id="weigh-btn" disabled>WEIGH IT</button>
</div>

<div id="result">
  <div id="r-icon">⚖️</div>
  <div id="r-title">—</div>
  <div id="r-msg">—</div>
  <button id="share-btn">SHARE RESULT</button>
  <div id="copy-msg"></div>
  <div id="next-lbl">NEXT POISE IN</div>
  <div id="countdown">—</div>
</div>

<script>
// ══════════════════════════════════════════
// RNG: mulberry32
// ══════════════════════════════════════════
function rng32(seed) {
  return () => {
    seed |= 0;
    seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashStr(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = (((h << 5) + h) ^ s.charCodeAt(i)) >>> 0;
  return h;
}

// ══════════════════════════════════════════
// DATE / PUZZLE NUMBER
// ══════════════════════════════════════════
const LAUNCH = '2026-05-21';
function todayET() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
}
function puzzleNum(dateStr) {
  const [ly, lm, ld] = LAUNCH.split('-').map(Number);
  const [dy, dm, dd] = dateStr.split('-').map(Number);
  const d1 = Date.UTC(ly, lm - 1, ld);
  const d2 = Date.UTC(dy, dm - 1, dd);
  return Math.max(1, Math.round((d2 - d1) / 86400000) + 1);
}

// ══════════════════════════════════════════
// PUZZLE GENERATION
// ══════════════════════════════════════════
const COLORS = [
  '#FF4757','#FFA502','#2ED573','#1E90FF','#FF6B81',
  '#FF6348','#7BED9F','#70A1FF','#ECCC68','#A29BFE'
];
const MIN_R = 13, MAX_R = 36;

function generateBalls(dateStr) {
  const base = hashStr(dateStr);
  for (let attempt = 0; attempt < 500; attempt++) {
    const rand = rng32((base ^ (attempt * 0x45D9F3B)) >>> 0);
    // 5 left radii
    const lR = Array.from({ length: 5 }, () => MIN_R + rand() * (MAX_R - MIN_R));
    // 4 right radii
    const rR = Array.from({ length: 4 }, () => MIN_R + rand() * (MAX_R - MIN_R));
    const lSum = lR.reduce((s, r) => s + r * r, 0);
    const rSum4 = rR.reduce((s, r) => s + r * r, 0);
    const r5sq = lSum - rSum4;
    if (r5sq < MIN_R * MIN_R || r5sq > MAX_R * MAX_R) continue;
    rR.push(Math.sqrt(r5sq));
    // all 10 radii in order [l0..l4, r0..r4]
    const all = [...lR, ...rR];
    // shuffle indices
    const idx = [...Array(10).keys()];
    for (let i = 9; i > 0; i--) {
      const j = (rand() * (i + 1)) | 0;
      [idx[i], idx[j]] = [idx[j], idx[i]];
    }
    // shuffle colors
    const cols = [...COLORS];
    for (let i = 9; i > 0; i--) {
      const j = (rand() * (i + 1)) | 0;
      [cols[i], cols[j]] = [cols[j], cols[i]];
    }
    return idx.map((orig, pos) => ({
      id: pos,
      r: all[orig],
      color: cols[pos],
      sol: orig < 5 ? 'left' : 'right',
      loc: 'staging'
    }));
  }
  // Guaranteed-balanced fallback
  const fbR = [
    [13,17,22,28,33],
    [15,19,24,26,30]
  ];
  const allFb = [...fbR[0], ...fbR[1]];
  return allFb.map((r, i) => ({
    id: i, r, color: COLORS[i],
    sol: i < 5 ? 'left' : 'right',
    loc: 'staging'
  }));
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const DATE  = todayET();
const PNUM  = puzzleNum(DATE);
const SKEY  = `poise_v1_${PNUM}`;

let balls   = generateBalls(DATE);
let dead    = false;
let drag    = null;

// ══════════════════════════════════════════
// DOM
// ══════════════════════════════════════════
const $ = id => document.getElementById(id);
const beam     = $('beam');
const zoneL    = $('zone-l');
const zoneR    = $('zone-r');
const stagingEl = $('staging');
const weighBtn = $('weigh-btn');
const cntL     = $('cnt-l');
const cntR     = $('cnt-r');
const resultEl = $('result');
const shareBtn = $('share-btn');

$('subtitle').textContent = `#${PNUM} · DAILY BALANCE PUZZLE`;

// ══════════════════════════════════════════
// BALL ELEMENTS
// ══════════════════════════════════════════
const ballEls = {};

function lighten(hex) {
  const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + 72);
  const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + 72);
  const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + 72);
  return `rgb(${r},${g},${b})`;
}

function makeBall(ball) {
  const el = document.createElement('div');
  el.className = 'ball';
  el.dataset.id = ball.id;
  const d = Math.round(ball.r * 2);
  el.style.width  = d + 'px';
  el.style.height = d + 'px';
  el.style.background = `radial-gradient(circle at 37% 30%, ${lighten(ball.color)} 0%, ${ball.color} 55%, ${ball.color}bb 100%)`;
  el.style.boxShadow  = '0 3px 10px rgba(0,0,0,.5), inset 0 -3px 6px rgba(0,0,0,.25)';
  el.addEventListener('mousedown', onDown);
  el.addEventListener('touchstart', onDown, { passive: false });
  ballEls[ball.id] = el;
  document.body.appendChild(el);
}

// ══════════════════════════════════════════
// SLOT POSITIONS
// ══════════════════════════════════════════
// zone: 3 top + 2 bottom
const ZONE_SLOTS = [
  [.2, .37], [.5, .37], [.8, .37],
  [.35, .67], [.65, .67]
];
// staging: 5+5 across 2 rows
const STAGE_SLOTS = [
  [.1, .38], [.3, .38], [.5, .38], [.7, .38], [.9, .38],
  [.1, .73], [.3, .73], [.5, .73], [.7, .73], [.9, .73]
];

function layoutAll() {
  const lR = zoneL.getBoundingClientRect();
  const rR = zoneR.getBoundingClientRect();
  const sR = stagingEl.getBoundingClientRect();
  let li = 0, ri = 0, si = 0;
  balls.forEach(b => {
    const el = ballEls[b.id];
    if (!el) return;
    let x, y;
    if (b.loc === 'left') {
      const [fx, fy] = ZONE_SLOTS[li++] || [.5, .5];
      x = lR.left + lR.width * fx - b.r;
      y = lR.top  + lR.height * fy - b.r;
    } else if (b.loc === 'right') {
      const [fx, fy] = ZONE_SLOTS[ri++] || [.5, .5];
      x = rR.left + rR.width * fx - b.r;
      y = rR.top  + rR.height * fy - b.r;
    } else {
      const [fx, fy] = STAGE_SLOTS[si++] || [.5, .5];
      x = sR.left + sR.width * fx - b.r;
      y = sR.top  + sR.height * fy - b.r;
    }
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
  });
}

// ══════════════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════════════
function getXY(e) {
  return e.touches
    ? [e.touches[0].clientX, e.touches[0].clientY]
    : [e.clientX, e.clientY];
}
function getChangedXY(e) {
  return e.changedTouches
    ? [e.changedTouches[0].clientX, e.changedTouches[0].clientY]
    : [e.clientX, e.clientY];
}
function inRect(x, y, r) {
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

function onDown(e) {
  if (dead) return;
  e.preventDefault();
  const el = e.currentTarget;
  const id = +el.dataset.id;
  const [cx, cy] = getXY(e);
  const rect = el.getBoundingClientRect();
  drag = {
    id, el,
    ox: cx - rect.left - rect.width / 2,
    oy: cy - rect.top  - rect.height / 2
  };
  el.classList.add('dragging');
  el.style.zIndex = 99;
}

document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, { passive: false });

function onMove(e) {
  if (!drag) return;
  e.preventDefault();
  const b = balls.find(b => b.id === drag.id);
  const [cx, cy] = getXY(e);
  drag.el.style.left = (cx - drag.ox - b.r) + 'px';
  drag.el.style.top  = (cy - drag.oy - b.r) + 'px';
  const lRect = zoneL.getBoundingClientRect();
  const rRect = zoneR.getBoundingClientRect();
  const lFull = balls.filter(x => x.loc === 'left'  && x.id !== drag.id).length >= 5;
  const rFull = balls.filter(x => x.loc === 'right' && x.id !== drag.id).length >= 5;
  zoneL.classList.toggle('over', !lFull && inRect(cx, cy, lRect));
  zoneR.classList.toggle('over', !rFull && inRect(cx, cy, rRect));
}

document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp, { passive: false });

function onUp(e) {
  if (!drag) return;
  e.preventDefault();
  const [cx, cy] = getChangedXY(e);
  const b = balls.find(b => b.id === drag.id);
  const lRect = zoneL.getBoundingClientRect();
  const rRect = zoneR.getBoundingClientRect();
  const lCnt = balls.filter(x => x.loc === 'left'  && x.id !== drag.id).length;
  const rCnt = balls.filter(x => x.loc === 'right' && x.id !== drag.id).length;
  if      (inRect(cx, cy, lRect) && lCnt < 5) b.loc = 'left';
  else if (inRect(cx, cy, rRect) && rCnt < 5) b.loc = 'right';
  else                                          b.loc = 'staging';
  drag.el.classList.remove('dragging');
  drag.el.style.zIndex = 10;
  zoneL.classList.remove('over');
  zoneR.classList.remove('over');
  drag = null;
  layoutAll();
  refreshUI();
}

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════
function refreshUI() {
  const lc = balls.filter(b => b.loc === 'left').length;
  const rc = balls.filter(b => b.loc === 'right').length;
  const sc = balls.filter(b => b.loc === 'staging').length;
  cntL.textContent = `${lc} / 5`;
  cntR.textContent = `${rc} / 5`;
  const ready = sc === 0 && lc === 5 && rc === 5;
  weighBtn.disabled = !ready;
  weighBtn.className = ready ? 'ready' : '';
}

// ══════════════════════════════════════════
// WEIGH
// ══════════════════════════════════════════
weighBtn.addEventListener('click', function weigh() {
  if (dead) return;
  const lBalls = balls.filter(b => b.loc === 'left');
  const rBalls = balls.filter(b => b.loc === 'right');
  const lArea  = lBalls.reduce((s, b) => s + b.r * b.r, 0);
  const rArea  = rBalls.reduce((s, b) => s + b.r * b.r, 0);
  const avg  = (lArea + rArea) / 2;
  const diff = Math.abs(lArea - rArea);
  const pct  = Math.round(diff / avg * 100);
  const won  = diff / avg < 0.0001;

  // Animate beam
  beam.classList.remove('anim-win', 'anim-left', 'anim-right');
  void beam.offsetWidth; // reflow
  if (won)        beam.classList.add('anim-win');
  else if (lArea > rArea) beam.classList.add('anim-left');
  else            beam.classList.add('anim-right');

  dead = true;
  Object.values(ballEls).forEach(el => el.classList.add('locked'));
  weighBtn.disabled = true;
  weighBtn.className = '';

  const res = {
    won, pct,
    heavier: lArea > rArea ? 'left' : 'right',
    lIds: lBalls.map(b => b.id),
    rIds: rBalls.map(b => b.id)
  };
  localStorage.setItem(SKEY, JSON.stringify(res));
  setTimeout(() => showResult(res), won ? 1600 : 900);
});

// ══════════════════════════════════════════
// RESULT
// ══════════════════════════════════════════
function showResult(res) {
  resultEl.classList.toggle('win', res.won);
  resultEl.classList.add('show');
  if (res.won) {
    $('r-icon').textContent  = '✨';
    $('r-title').textContent = 'Perfectly Poised';
    $('r-msg').textContent   = 'The scale holds perfectly level.';
  } else {
    $('r-icon').textContent  = '⚖️';
    $('r-title').textContent = 'Off Balance';
    const side = res.heavier === 'left' ? 'Left' : 'Right';
    $('r-msg').textContent   = `${side} side is heavier (+${res.pct}%)`;
  }
  shareBtn.onclick = () => doShare(res);
  tickCountdown();
  const cdTimer = setInterval(tickCountdown, 1000);
  // clear if overlay closed (unlikely but safe)
  resultEl.addEventListener('click', e => {
    if (e.target === resultEl) { /* allow clicks through */ }
  }, { once: true });
}

function doShare(res) {
  const dots = '⚫⚫⚫⚫⚫';
  const line2 = res.won
    ? 'Perfectly Poised ✨'
    : `${res.heavier === 'left' ? 'Left' : 'Right'} was heavier (+${res.pct}%)`;
  const text = `POISE #${PNUM} ⚖️\n${line2}\n${dots} | ${dots}`;
  navigator.clipboard.writeText(text)
    .then(() => { $('copy-msg').textContent = 'Copied!'; setTimeout(() => $('copy-msg').textContent = '', 2000); })
    .catch(() => { $('copy-msg').textContent = 'Copy failed — try again'; });
}

function tickCountdown() {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  }).formatToParts(now);
  const h = +parts.find(p => p.type === 'hour').value;
  const m = +parts.find(p => p.type === 'minute').value;
  const s = +parts.find(p => p.type === 'second').value;
  const rem = 86400 - (h * 3600 + m * 60 + s);
  const rh = String(Math.floor(rem / 3600)).padStart(2, '0');
  const rm = String(Math.floor(rem % 3600 / 60)).padStart(2, '0');
  const rs = String(rem % 60).padStart(2, '0');
  $('countdown').textContent = `${rh}:${rm}:${rs}`;
}

// ══════════════════════════════════════════
// RESTORE SAVED STATE
// ══════════════════════════════════════════
function restore() {
  const raw = localStorage.getItem(SKEY);
  if (!raw) return false;
  try {
    const res = JSON.parse(raw);
    res.lIds.forEach(id => { const b = balls.find(b => b.id === +id); if (b) b.loc = 'left'; });
    res.rIds.forEach(id => { const b = balls.find(b => b.id === +id); if (b) b.loc = 'right'; });
    dead = true;
    Object.values(ballEls).forEach(el => el.classList.add('locked'));
    layoutAll();
    refreshUI();
    // Static final beam position (no animation)
    beam.style.animation = 'none';
    if (!res.won) {
      beam.style.transform = res.heavier === 'left' ? 'rotate(9deg)' : 'rotate(-9deg)';
    }
    setTimeout(() => showResult(res), 250);
    return true;
  } catch (e) { return false; }
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
balls.forEach(makeBall);
window.addEventListener('resize', () => { if (!drag) layoutAll(); });
requestAnimationFrame(() => {
  layoutAll();
  if (!restore()) refreshUI();
});
</script>
