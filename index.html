<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>POISE — Daily Balance Puzzle</title>
<meta name="theme-color" content="#0f1f0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poise">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #0f1f0a;
  --green:        #4b7a2f;
  --green-bright: #6aaa3a;
  --green-text:   #7fc040;
  --green-dim:    #1e3212;
  --green-faint:  #151f10;
  --red:          #943020;
  --red-bright:   #c04030;
}

html, body {
  width: 100%; height: 100%;
  background-color: var(--bg);
  background-image:
    repeating-linear-gradient( 45deg, transparent 0, transparent 14px, rgba(75,122,47,.025) 14px, rgba(75,122,47,.025) 15px),
    repeating-linear-gradient(-45deg, transparent 0, transparent 14px, rgba(75,122,47,.025) 14px, rgba(75,122,47,.025) 15px);
  color: var(--green-text);
  font-family: 'Georgia', 'Times New Roman', serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ── Header ── */
#header {
  padding: 12px 0 4px;
  text-align: center;
  flex-shrink: 0;
}
.rule {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 5px 0;
  color: var(--green-dim);
}
.rule::before, .rule::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--green-dim) 30%, var(--green-dim) 70%, transparent);
}
.rule-diamond {
  width: 5px; height: 5px;
  background: var(--green);
  transform: rotate(45deg);
  flex-shrink: 0;
}
#title {
  font-size: 30px;
  font-weight: 400;
  letter-spacing: 16px;
  text-indent: 16px;
  text-transform: uppercase;
  color: var(--green-text);
  text-shadow: 0 0 24px rgba(106,170,58,.2), 0 1px 0 rgba(0,0,0,.8);
}
#subtitle {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 9px;
  color: var(--green);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
}

/* ── Scale SVG ── */
#scale-wrap {
  height: 104px;
  flex-shrink: 0;
  position: relative;
}
#scale-svg { width: 100%; height: 100%; overflow: visible; }

#scale-beam-g {
  transform-box: view-box;
  transform-origin: 150px 40px;
}
@keyframes beam-win {
  0%   { transform: rotate(0deg); }
  12%  { transform: rotate(8deg); }
  26%  { transform: rotate(-7deg); }
  40%  { transform: rotate(5deg); }
  54%  { transform: rotate(-3deg); }
  68%  { transform: rotate(1.5deg); }
  82%  { transform: rotate(-0.5deg); }
  100% { transform: rotate(0deg); }
}
@keyframes beam-left {
  0%   { transform: rotate(0deg); }
  45%  { transform: rotate(-12deg); }
  72%  { transform: rotate(-8.5deg); }
  100% { transform: rotate(-9deg); }
}
@keyframes beam-right {
  0%   { transform: rotate(0deg); }
  45%  { transform: rotate(12deg); }
  72%  { transform: rotate(8.5deg); }
  100% { transform: rotate(9deg); }
}
.anim-win   { animation: beam-win  1.5s ease-out forwards; }
.anim-left  { animation: beam-left 0.8s ease-out forwards; }
.anim-right { animation: beam-right 0.8s ease-out forwards; }

/* ── Drop zones ── */
#zones {
  display: flex;
  gap: 10px;
  flex: 1;
  min-height: 0;
  margin-bottom: 10px;
}
.zone {
  flex: 1;
  position: relative;
  background: transparent;
  border: 1px solid var(--green-faint);
  transition: background .15s;
}
/* corner brackets via 8-gradient trick */
.zone::after {
  content: '';
  position: absolute;
  inset: -1px;
  pointer-events: none;
  background-image:
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim));
  background-size:
    14px 1px, 1px 14px, 14px 1px, 1px 14px,
    14px 1px, 1px 14px, 14px 1px, 1px 14px;
  background-position:
    top left, top left, top right, top right,
    bottom left, bottom left, bottom right, bottom right;
  background-repeat: no-repeat;
}
.zone.over { background: rgba(75,122,47,.05); }
.zone.over::after {
  background-image:
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green));
  background-size:
    14px 1px, 1px 14px, 14px 1px, 1px 14px,
    14px 1px, 1px 14px, 14px 1px, 1px 14px;
  background-position:
    top left, top left, top right, top right,
    bottom left, bottom left, bottom right, bottom right;
  background-repeat: no-repeat;
}
.zone.zone-win  { border-color: var(--green-dim); background: rgba(75,122,47,.04); }
.zone.zone-win::after {
  background-image:
    linear-gradient(var(--green-bright), var(--green-bright)),
    linear-gradient(var(--green-bright), var(--green-bright)),
    linear-gradient(var(--green-bright), var(--green-bright)),
    linear-gradient(var(--green-bright), var(--green-bright)),
    linear-gradient(var(--green-bright), var(--green-bright)),
    linear-gradient(var(--green-bright), var(--green-bright)),
    linear-gradient(var(--green-bright), var(--green-bright)),
    linear-gradient(var(--green-bright), var(--green-bright));
  background-size: 14px 1px, 1px 14px, 14px 1px, 1px 14px, 14px 1px, 1px 14px, 14px 1px, 1px 14px;
  background-position: top left, top left, top right, top right, bottom left, bottom left, bottom right, bottom right;
  background-repeat: no-repeat;
}
.zone.zone-heavy { border-color: var(--red); }
.zone.zone-heavy::after {
  background-image:
    linear-gradient(var(--red-bright), var(--red-bright)),
    linear-gradient(var(--red-bright), var(--red-bright)),
    linear-gradient(var(--red-bright), var(--red-bright)),
    linear-gradient(var(--red-bright), var(--red-bright)),
    linear-gradient(var(--red-bright), var(--red-bright)),
    linear-gradient(var(--red-bright), var(--red-bright)),
    linear-gradient(var(--red-bright), var(--red-bright)),
    linear-gradient(var(--red-bright), var(--red-bright));
  background-size: 14px 1px, 1px 14px, 14px 1px, 1px 14px, 14px 1px, 1px 14px, 14px 1px, 1px 14px;
  background-position: top left, top left, top right, top right, bottom left, bottom left, bottom right, bottom right;
  background-repeat: no-repeat;
}
.zone-lbl {
  position: absolute;
  bottom: 8px; width: 100%;
  text-align: center;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 9px; letter-spacing: 3px;
  color: var(--green-dim);
  text-transform: uppercase;
  pointer-events: none;
  transition: color .4s;
}
.zone.zone-win .zone-lbl   { color: var(--green); }
.zone.zone-heavy .zone-lbl { color: var(--red); }
.zone-cnt {
  position: absolute;
  top: 8px; right: 10px;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 10px;
  color: var(--green-dim);
  font-variant-numeric: tabular-nums;
  transition: color .4s;
}
.zone.zone-win.revealed .zone-cnt   { color: var(--green-bright); font-weight: 600; }
.zone.zone-heavy.revealed .zone-cnt { color: var(--red-bright);   font-weight: 600; }
.zone.zone-light.revealed .zone-cnt { color: var(--green-dim); }

/* ── Staging ── */
#staging {
  height: 112px;
  flex-shrink: 0;
  position: relative;
  margin-bottom: 10px;
  border: 1px solid var(--green-faint);
  transition: height .35s ease, margin .35s ease, opacity .25s ease;
  overflow: hidden;
}
#staging::after {
  content: '';
  position: absolute; inset: -1px;
  pointer-events: none;
  background-image:
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim));
  background-size: 10px 1px, 1px 10px, 10px 1px, 1px 10px, 10px 1px, 1px 10px, 10px 1px, 1px 10px;
  background-position: top left, top left, top right, top right, bottom left, bottom left, bottom right, bottom right;
  background-repeat: no-repeat;
}
#staging-lbl {
  position: absolute;
  top: 7px; width: 100%;
  text-align: center;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 8px; letter-spacing: 3px;
  color: var(--green-dim);
  text-transform: uppercase;
  pointer-events: none;
}
.game-over #staging   { height: 0; margin-bottom: 0; opacity: 0; }
.game-over #weigh-btn { height: 0; margin-bottom: 0; opacity: 0; pointer-events: none; overflow: hidden; }

/* ── Weigh button ── */
#weigh-btn {
  height: 46px;
  flex-shrink: 0;
  margin-bottom: 0;
  width: 100%;
  background: transparent;
  border: 1px solid var(--green-faint);
  color: var(--green-dim);
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: 6px; text-indent: 6px;
  text-transform: uppercase;
  cursor: not-allowed;
  position: relative;
  transition: border-color .2s, color .2s, height .35s ease, margin .35s ease, opacity .25s ease;
}
#weigh-btn::after {
  content: '';
  position: absolute; inset: -1px;
  pointer-events: none;
  background-image:
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim)),
    linear-gradient(var(--green-dim), var(--green-dim));
  background-size: 10px 1px, 1px 10px, 10px 1px, 1px 10px, 10px 1px, 1px 10px, 10px 1px, 1px 10px;
  background-position: top left, top left, top right, top right, bottom left, bottom left, bottom right, bottom right;
  background-repeat: no-repeat;
}
@keyframes pulse-btn {
  0%, 100% { border-color: var(--green-dim); color: var(--green); }
  50% { border-color: var(--green); color: var(--green-text); box-shadow: 0 0 18px rgba(106,170,58,.1); }
}
#weigh-btn.ready { cursor: pointer; animation: pulse-btn 2.4s ease-in-out infinite; }
#weigh-btn.ready::after {
  background-image:
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green)),
    linear-gradient(var(--green), var(--green));
  background-size: 10px 1px, 1px 10px, 10px 1px, 1px 10px, 10px 1px, 1px 10px, 10px 1px, 1px 10px;
  background-position: top left, top left, top right, top right, bottom left, bottom left, bottom right, bottom right;
  background-repeat: no-repeat;
}
#weigh-btn.ready:active { background: rgba(75,122,47,.08); }

/* ── Copyright footer ── */
#footer {
  flex-shrink: 0;
  padding: 7px 0 9px;
  text-align: center;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 8px;
  letter-spacing: 2.5px;
  color: var(--green-dim);
  text-transform: uppercase;
}

/* ── Balls ── */
.ball {
  position: fixed;
  border-radius: 50%;
  cursor: grab;
  z-index: 10;
  will-change: left, top;
  display: flex; align-items: center; justify-content: center;
}
.ball.dragging { cursor: grabbing; z-index: 99; filter: brightness(1.15); }
.ball.locked   { cursor: default; pointer-events: none; }
.ball-weight {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-weight: 800;
  color: rgba(255,255,255,.92);
  text-shadow: 0 1px 4px rgba(0,0,0,.95);
  opacity: 0;
  transition: opacity .55s ease;
  pointer-events: none;
  line-height: 1;
  white-space: nowrap;
}
.ball.revealed .ball-weight { opacity: 1; }

/* ── Result panel ── */
#result-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  transform: translateY(110%);
  background-color: #0d1a09;
  background-image:
    repeating-linear-gradient( 45deg, transparent 0, transparent 14px, rgba(75,122,47,.02) 14px, rgba(75,122,47,.02) 15px),
    repeating-linear-gradient(-45deg, transparent 0, transparent 14px, rgba(75,122,47,.02) 14px, rgba(75,122,47,.02) 15px);
  border-top: 1px solid var(--green-dim);
  padding: 14px 20px 26px;
  z-index: 100;
  transition: transform 0.45s cubic-bezier(0.34, 1.15, 0.64, 1);
  max-width: 480px;
  margin: 0 auto;
}
#result-panel::before {
  content: '';
  display: block;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--green-dim) 20%, var(--green-dim) 80%, transparent);
  margin-bottom: 12px;
}
#result-panel.show { transform: translateY(0); }
#rp-row1 {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 4px;
}
#rp-icon { font-size: 18px; line-height: 1; }
@keyframes win-pulse { 0%,100%{opacity:.75} 50%{opacity:1} }
#result-panel.win #rp-icon { animation: win-pulse 2.2s ease-in-out infinite; }
#rp-title {
  font-size: 15px; font-weight: 400;
  letter-spacing: 5px; text-indent: 5px;
  text-transform: uppercase;
  color: var(--green-text);
}
#rp-msg {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  text-align: center; font-size: 11px;
  color: var(--green); margin-bottom: 14px; letter-spacing: 1px;
}
#rp-actions { display: flex; align-items: center; gap: 14px; }
#share-btn {
  flex: 1; padding: 10px 0;
  background: transparent;
  border: 1px solid var(--green);
  color: var(--green-text);
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase;
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
#share-btn:active { background: rgba(75,122,47,.12); }
#copy-msg {
  position: absolute;
  bottom: -17px; left: 0; right: 0;
  text-align: center; font-size: 10px;
  color: var(--green);
}
#rp-countdown { text-align: right; }
#rp-next-lbl {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 8px; color: var(--green-dim);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px;
}
#countdown {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 20px; font-weight: 300;
  letter-spacing: 3px; color: var(--green);
  font-variant-numeric: tabular-nums;
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="title">Poise</div>
    <div class="rule"><div class="rule-diamond"></div></div>
    <div id="subtitle">#1 · Daily Balance Puzzle</div>
  </div>

  <div id="scale-wrap">
    <svg id="scale-svg" viewBox="0 0 300 100" preserveAspectRatio="xMidYMid meet"
         fill="none" stroke="#4b7a2f" stroke-linecap="round" stroke-linejoin="round">
      <!-- base pedestal -->
      <line x1="115" y1="98" x2="185" y2="98" stroke-width="1.5"/>
      <line x1="122" y1="94" x2="178" y2="94" stroke-width="0.75"/>
      <line x1="129" y1="90" x2="171" y2="90" stroke-width="0.5"/>
      <!-- vertical post (double line) -->
      <line x1="148" y1="90" x2="148" y2="46" stroke-width="0.6"/>
      <line x1="152" y1="90" x2="152" y2="46" stroke-width="0.6"/>
      <!-- fulcrum diamond -->
      <path d="M150,34 L156,40 L150,46 L144,40 Z" stroke-width="1"/>
      <path d="M150,37 L153,40 L150,43 L147,40 Z" stroke-width="0.4"/>
      <!-- animated beam group -->
      <g id="scale-beam-g">
        <line x1="18" y1="38" x2="282" y2="38" stroke-width="0.4"/>
        <line x1="18" y1="40" x2="282" y2="40" stroke-width="1.4"/>
        <line x1="18" y1="42" x2="282" y2="42" stroke-width="0.4"/>
        <!-- end caps + diamonds -->
        <line x1="18" y1="35" x2="18" y2="45" stroke-width="1"/>
        <line x1="282" y1="35" x2="282" y2="45" stroke-width="1"/>
        <path d="M18,33 L21,36 L18,39 L15,36 Z" stroke-width="0.7"/>
        <path d="M282,33 L285,36 L282,39 L279,36 Z" stroke-width="0.7"/>
        <!-- left chain + pan -->
        <polyline points="18,45 15,51 18,54 15,58 18,61 15,65 18,68" stroke-width="0.8"/>
        <line x1="18" y1="70" x2="18" y2="72" stroke-width="0.8"/>
        <ellipse cx="18" cy="75" rx="26" ry="4" stroke-width="1"/>
        <ellipse cx="18" cy="75" rx="20" ry="2.5" stroke-width="0.4"/>
        <!-- right chain + pan -->
        <polyline points="282,45 285,51 282,54 285,58 282,61 285,65 282,68" stroke-width="0.8"/>
        <line x1="282" y1="70" x2="282" y2="72" stroke-width="0.8"/>
        <ellipse cx="282" cy="75" rx="26" ry="4" stroke-width="1"/>
        <ellipse cx="282" cy="75" rx="20" ry="2.5" stroke-width="0.4"/>
      </g>
    </svg>
  </div>

  <div id="zones">
    <div class="zone" id="zone-l">
      <span class="zone-cnt" id="cnt-l">0 / 5</span>
      <span class="zone-lbl">Left</span>
    </div>
    <div class="zone" id="zone-r">
      <span class="zone-cnt" id="cnt-r">0 / 5</span>
      <span class="zone-lbl">Right</span>
    </div>
  </div>

  <div id="staging">
    <span id="staging-lbl">Staging Area</span>
  </div>

  <button id="weigh-btn" disabled>Weigh It</button>

  <div id="footer">◆ &nbsp; Poise &nbsp;·&nbsp; © 2026 &nbsp; ◆</div>
</div>

<!-- Result panel -->
<div id="result-panel">
  <div id="rp-row1">
    <span id="rp-icon">⚖️</span>
    <span id="rp-title">—</span>
  </div>
  <div id="rp-msg">—</div>
  <div id="rp-actions">
    <button id="share-btn">Share Result<span id="copy-msg"></span></button>
    <div id="rp-countdown">
      <div id="rp-next-lbl">Next Poise in</div>
      <div id="countdown">—</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// PWA — favicon + homescreen icon + manifest
// ══════════════════════════════════════════
(function() {
  // Draw scale icon on canvas → PNG data URI
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const g = c.getContext('2d');
    const s = size / 100; // scale factor

    // Background
    g.fillStyle = '#0f1f0a';
    g.beginPath();
    const r = size * 0.18;
    g.moveTo(r, 0); g.lineTo(size - r, 0);
    g.quadraticCurveTo(size, 0, size, r);
    g.lineTo(size, size - r);
    g.quadraticCurveTo(size, size, size - r, size);
    g.lineTo(r, size);
    g.quadraticCurveTo(0, size, 0, size - r);
    g.lineTo(0, r);
    g.quadraticCurveTo(0, 0, r, 0);
    g.fill();

    g.strokeStyle = '#6aaa3a';
    g.lineCap = 'round';

    // Post
    g.lineWidth = 3 * s;
    g.beginPath(); g.moveTo(50*s, 80*s); g.lineTo(50*s, 47*s); g.stroke();

    // Base
    g.lineWidth = 2.5 * s;
    g.beginPath(); g.moveTo(36*s, 83*s); g.lineTo(64*s, 83*s); g.stroke();
    g.lineWidth = 1.5 * s;
    g.beginPath(); g.moveTo(41*s, 78*s); g.lineTo(59*s, 78*s); g.stroke();

    // Fulcrum diamond
    g.lineWidth = 1.8 * s;
    g.beginPath();
    g.moveTo(50*s, 38*s); g.lineTo(55*s, 43*s);
    g.lineTo(50*s, 48*s); g.lineTo(45*s, 43*s);
    g.closePath(); g.stroke();

    // Beam (triple line)
    g.lineWidth = 2 * s;
    g.beginPath(); g.moveTo(12*s, 43*s); g.lineTo(88*s, 43*s); g.stroke();
    g.lineWidth = 0.8 * s;
    g.beginPath(); g.moveTo(12*s, 40*s); g.lineTo(88*s, 40*s); g.stroke();
    g.beginPath(); g.moveTo(12*s, 46*s); g.lineTo(88*s, 46*s); g.stroke();

    // Left chain
    g.lineWidth = 1.2 * s;
    g.beginPath();
    g.moveTo(12*s,46*s); g.lineTo(10*s,51*s); g.lineTo(12*s,54*s);
    g.lineTo(10*s,58*s); g.lineTo(12*s,61*s); g.lineTo(10*s,65*s); g.lineTo(12*s,68*s);
    g.stroke();

    // Left pan
    g.lineWidth = 1.8 * s;
    g.beginPath(); g.ellipse(12*s, 72*s, 12*s, 3.5*s, 0, 0, Math.PI*2); g.stroke();

    // Right chain
    g.lineWidth = 1.2 * s;
    g.beginPath();
    g.moveTo(88*s,46*s); g.lineTo(90*s,51*s); g.lineTo(88*s,54*s);
    g.lineTo(90*s,58*s); g.lineTo(88*s,61*s); g.lineTo(90*s,65*s); g.lineTo(88*s,68*s);
    g.stroke();

    // Right pan
    g.lineWidth = 1.8 * s;
    g.beginPath(); g.ellipse(88*s, 72*s, 12*s, 3.5*s, 0, 0, Math.PI*2); g.stroke();

    return c.toDataURL('image/png');
  }

  const icon192 = makeIcon(192);
  const icon32  = makeIcon(32);

  // Favicon
  const fav = document.createElement('link');
  fav.rel = 'icon'; fav.type = 'image/png'; fav.href = icon32;
  document.head.appendChild(fav);

  // Apple touch icon
  const apple = document.createElement('link');
  apple.rel = 'apple-touch-icon'; apple.href = icon192;
  document.head.appendChild(apple);

  // Web app manifest
  const manifest = {
    name: 'Poise',
    short_name: 'Poise',
    description: 'Daily balance puzzle — find the perfect split.',
    start_url: './',
    display: 'standalone',
    background_color: '#0f1f0a',
    theme_color: '#4b7a2f',
    icons: [{ src: icon192, sizes: '192x192', type: 'image/png' }]
  };
  const mlink = document.createElement('link');
  mlink.rel = 'manifest';
  mlink.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
  document.head.appendChild(mlink);
})();

// ══════════════════════════════════════════
// RNG: mulberry32
// ══════════════════════════════════════════
function rng32(seed) {
  return () => {
    seed |= 0;
    seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashStr(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = (((h << 5) + h) ^ s.charCodeAt(i)) >>> 0;
  return h;
}

// ══════════════════════════════════════════
// DATE / PUZZLE NUMBER
// ══════════════════════════════════════════
const LAUNCH = '2026-05-21';
function todayET() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
}
function puzzleNum(dateStr) {
  const [ly, lm, ld] = LAUNCH.split('-').map(Number);
  const [dy, dm, dd] = dateStr.split('-').map(Number);
  const d1 = Date.UTC(ly, lm - 1, ld);
  const d2 = Date.UTC(dy, dm - 1, dd);
  return Math.max(1, Math.round((d2 - d1) / 86400000) + 1);
}

// ══════════════════════════════════════════
// PUZZLE GENERATION
// ══════════════════════════════════════════
// Muted, earthy palette — cohesive with the engraving aesthetic
const COLORS = [
  '#c98555', // terracotta
  '#c8a83e', // antique gold
  '#88c260', // sage green
  '#5e8fba', // slate blue
  '#bf7888', // dusty rose
  '#c07838', // burnt sienna
  '#52b08a', // sea green
  '#8090c8', // periwinkle
  '#c0ac3a', // harvest gold
  '#9268b8', // muted violet
];
const MIN_R = 13, MAX_R = 36;

function generateBalls(dateStr) {
  const base = hashStr(dateStr);
  for (let attempt = 0; attempt < 500; attempt++) {
    const rand = rng32((base ^ (attempt * 0x45D9F3B)) >>> 0);
    const lR = Array.from({ length: 5 }, () => MIN_R + rand() * (MAX_R - MIN_R));
    const rR = Array.from({ length: 4 }, () => MIN_R + rand() * (MAX_R - MIN_R));
    const lSum = lR.reduce((s, r) => s + r * r, 0);
    const rSum4 = rR.reduce((s, r) => s + r * r, 0);
    const r5sq = lSum - rSum4;
    if (r5sq < MIN_R * MIN_R || r5sq > MAX_R * MAX_R) continue;
    rR.push(Math.sqrt(r5sq));
    const all = [...lR, ...rR];
    const idx = [...Array(10).keys()];
    for (let i = 9; i > 0; i--) { const j = (rand()*(i+1))|0; [idx[i],idx[j]]=[idx[j],idx[i]]; }
    const cols = [...COLORS];
    for (let i = 9; i > 0; i--) { const j = (rand()*(i+1))|0; [cols[i],cols[j]]=[cols[j],cols[i]]; }
    return idx.map((orig, pos) => ({
      id: pos, r: all[orig], color: cols[pos],
      sol: orig < 5 ? 'left' : 'right', loc: 'staging'
    }));
  }
  return [13,17,22,28,33,15,19,24,26,30].map((r,i) => ({
    id:i, r, color:COLORS[i], sol: i<5?'left':'right', loc:'staging'
  }));
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const DATE = todayET();
const PNUM = puzzleNum(DATE);
const SKEY = `poise_v1_${PNUM}`;

let balls = generateBalls(DATE);
let dead  = false;
let drag  = null;

// ══════════════════════════════════════════
// DOM
// ══════════════════════════════════════════
const $ = id => document.getElementById(id);
const beamG     = $('scale-beam-g');
const zoneL     = $('zone-l');
const zoneR     = $('zone-r');
const stagingEl = $('staging');
const appEl     = $('app');
const weighBtn  = $('weigh-btn');
const cntL      = $('cnt-l');
const cntR      = $('cnt-r');
const panel     = $('result-panel');
const shareBtn  = $('share-btn');

$('subtitle').textContent = `#${PNUM} · Daily Balance Puzzle`;

// ══════════════════════════════════════════
// BALL ELEMENTS
// ══════════════════════════════════════════
const ballEls = {};

function lighten(hex) {
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + 58);
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + 58);
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + 58);
  return `rgb(${r},${g},${b})`;
}

function makeBall(ball) {
  const el = document.createElement('div');
  el.className = 'ball';
  el.dataset.id = ball.id;
  const d = Math.round(ball.r * 2);
  el.style.width  = d + 'px';
  el.style.height = d + 'px';
  el.style.background = `radial-gradient(circle at 37% 30%, ${lighten(ball.color)} 0%, ${ball.color} 55%, ${ball.color}cc 100%)`;
  el.style.boxShadow  = `0 3px 12px rgba(0,0,0,.7), inset 0 -2px 5px rgba(0,0,0,.25), 0 0 0 1px rgba(0,0,0,.25)`;
  const lbl = document.createElement('span');
  lbl.className = 'ball-weight';
  lbl.textContent = Math.round(Math.PI * ball.r * ball.r);
  lbl.style.fontSize = Math.max(7, Math.min(13, Math.round(ball.r * 0.36))) + 'px';
  el.appendChild(lbl);
  el.addEventListener('mousedown', onDown);
  el.addEventListener('touchstart', onDown, { passive: false });
  ballEls[ball.id] = el;
  document.body.appendChild(el);
}

// ══════════════════════════════════════════
// SLOT POSITIONS
// ══════════════════════════════════════════
const ZONE_SLOTS = [
  [.2,.37],[.5,.37],[.8,.37],
  [.35,.67],[.65,.67]
];
const STAGE_SLOTS = [
  [.1,.38],[.3,.38],[.5,.38],[.7,.38],[.9,.38],
  [.1,.73],[.3,.73],[.5,.73],[.7,.73],[.9,.73]
];

function layoutAll() {
  const lR = zoneL.getBoundingClientRect();
  const rR = zoneR.getBoundingClientRect();
  const sR = stagingEl.getBoundingClientRect();
  let li=0, ri=0, si=0;
  balls.forEach(b => {
    const el = ballEls[b.id];
    if (!el) return;
    let x, y;
    if (b.loc === 'left') {
      const [fx,fy] = ZONE_SLOTS[li++] || [.5,.5];
      x = lR.left + lR.width*fx - b.r;
      y = lR.top  + lR.height*fy - b.r;
    } else if (b.loc === 'right') {
      const [fx,fy] = ZONE_SLOTS[ri++] || [.5,.5];
      x = rR.left + rR.width*fx - b.r;
      y = rR.top  + rR.height*fy - b.r;
    } else {
      const [fx,fy] = STAGE_SLOTS[si++] || [.5,.5];
      x = sR.left + sR.width*fx - b.r;
      y = sR.top  + sR.height*fy - b.r;
    }
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
  });
}

// ══════════════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════════════
function getXY(e)        { return e.touches        ? [e.touches[0].clientX, e.touches[0].clientY]        : [e.clientX, e.clientY]; }
function getChangedXY(e) { return e.changedTouches ? [e.changedTouches[0].clientX, e.changedTouches[0].clientY] : [e.clientX, e.clientY]; }
function inRect(x,y,r)   { return x>=r.left && x<=r.right && y>=r.top && y<=r.bottom; }

function onDown(e) {
  if (dead) return;
  e.preventDefault();
  const el = e.currentTarget;
  const [cx,cy] = getXY(e);
  const rect = el.getBoundingClientRect();
  drag = { id: +el.dataset.id, el, ox: cx-rect.left-rect.width/2, oy: cy-rect.top-rect.height/2 };
  el.classList.add('dragging');
  el.style.zIndex = 99;
}

document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, { passive: false });
function onMove(e) {
  if (!drag) return;
  e.preventDefault();
  const b = balls.find(b => b.id === drag.id);
  const [cx,cy] = getXY(e);
  drag.el.style.left = (cx - drag.ox - b.r) + 'px';
  drag.el.style.top  = (cy - drag.oy - b.r) + 'px';
  const lRect = zoneL.getBoundingClientRect();
  const rRect = zoneR.getBoundingClientRect();
  const lFull = balls.filter(x => x.loc==='left'  && x.id!==drag.id).length >= 5;
  const rFull = balls.filter(x => x.loc==='right' && x.id!==drag.id).length >= 5;
  zoneL.classList.toggle('over', !lFull && inRect(cx,cy,lRect));
  zoneR.classList.toggle('over', !rFull && inRect(cx,cy,rRect));
}

document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp, { passive: false });
function onUp(e) {
  if (!drag) return;
  e.preventDefault();
  const [cx,cy] = getChangedXY(e);
  const b = balls.find(b => b.id === drag.id);
  const lRect = zoneL.getBoundingClientRect();
  const rRect = zoneR.getBoundingClientRect();
  const lCnt = balls.filter(x => x.loc==='left'  && x.id!==drag.id).length;
  const rCnt = balls.filter(x => x.loc==='right' && x.id!==drag.id).length;
  if      (inRect(cx,cy,lRect) && lCnt<5) b.loc = 'left';
  else if (inRect(cx,cy,rRect) && rCnt<5) b.loc = 'right';
  else                                      b.loc = 'staging';
  drag.el.classList.remove('dragging');
  drag.el.style.zIndex = 10;
  zoneL.classList.remove('over');
  zoneR.classList.remove('over');
  drag = null;
  layoutAll();
  refreshUI();
}

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════
function refreshUI() {
  const lc = balls.filter(b => b.loc==='left').length;
  const rc = balls.filter(b => b.loc==='right').length;
  const sc = balls.filter(b => b.loc==='staging').length;
  cntL.textContent = `${lc} / 5`;
  cntR.textContent = `${rc} / 5`;
  const ready = sc===0 && lc===5 && rc===5;
  weighBtn.disabled = !ready;
  weighBtn.className = ready ? 'ready' : '';
}
function fmt(n) { return Math.round(n).toLocaleString(); }

// ══════════════════════════════════════════
// WEIGH
// ══════════════════════════════════════════
weighBtn.addEventListener('click', function weigh() {
  if (dead) return;
  const lBalls = balls.filter(b => b.loc==='left');
  const rBalls = balls.filter(b => b.loc==='right');
  const lArea  = lBalls.reduce((s,b) => s+b.r*b.r, 0);
  const rArea  = rBalls.reduce((s,b) => s+b.r*b.r, 0);
  const avg  = (lArea+rArea)/2;
  const diff = Math.abs(lArea-rArea);
  const pct  = Math.round(diff/avg*100);
  const won  = diff/avg < 0.0001;

  beamG.classList.remove('anim-win','anim-left','anim-right');
  void beamG.getBoundingClientRect();
  if (won)             beamG.classList.add('anim-win');
  else if (lArea>rArea) beamG.classList.add('anim-right');
  else                 beamG.classList.add('anim-left');

  dead = true;
  weighBtn.disabled = true; weighBtn.className = '';
  Object.values(ballEls).forEach(el => el.classList.add('locked','revealed'));
  cntL.textContent = fmt(Math.PI*lArea);
  cntR.textContent = fmt(Math.PI*rArea);
  if (won) {
    zoneL.classList.add('zone-win','revealed');
    zoneR.classList.add('zone-win','revealed');
  } else {
    (lArea>rArea ? zoneL : zoneR).classList.add('zone-heavy','revealed');
    (lArea>rArea ? zoneR : zoneL).classList.add('zone-light','revealed');
  }
  appEl.classList.add('game-over');
  requestAnimationFrame(() => requestAnimationFrame(layoutAll));
  const res = { won, pct, heavier: lArea>rArea?'left':'right',
    lIds: lBalls.map(b=>b.id), rIds: rBalls.map(b=>b.id) };
  localStorage.setItem(SKEY, JSON.stringify(res));
  setTimeout(() => showResult(res), won ? 1600 : 900);
});

// ══════════════════════════════════════════
// RESULT PANEL
// ══════════════════════════════════════════
function showResult(res) {
  panel.classList.toggle('win', res.won);
  panel.classList.add('show');
  $('rp-icon').textContent  = res.won ? '✨' : '⚖️';
  $('rp-title').textContent = res.won ? 'Perfectly Poised' : 'Off Balance';
  $('rp-msg').textContent   = res.won
    ? 'The scale holds perfectly level.'
    : `${res.heavier==='left'?'Left':'Right'} side is heavier (+${res.pct}%)`;
  shareBtn.onclick = () => doShare(res);
  tickCountdown();
  setInterval(tickCountdown, 1000);
}

function doShare(res) {
  const d = '⚫⚫⚫⚫⚫';
  const l2 = res.won ? 'Perfectly Poised ✨'
    : `${res.heavier==='left'?'Left':'Right'} was heavier (+${res.pct}%)`;
  navigator.clipboard.writeText(`POISE #${PNUM} ⚖️\n${l2}\n${d} | ${d}`)
    .then(()=>{ $('copy-msg').textContent='Copied!'; setTimeout(()=>$('copy-msg').textContent='',2000); })
    .catch(()=>{ $('copy-msg').textContent='Copy failed'; });
}

function tickCountdown() {
  const parts = new Intl.DateTimeFormat('en-US',{
    timeZone:'America/New_York', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
  }).formatToParts(new Date());
  const h = +parts.find(p=>p.type==='hour').value;
  const m = +parts.find(p=>p.type==='minute').value;
  const s = +parts.find(p=>p.type==='second').value;
  const rem = 86400-(h*3600+m*60+s);
  $('countdown').textContent = [
    String(Math.floor(rem/3600)).padStart(2,'0'),
    String(Math.floor(rem%3600/60)).padStart(2,'0'),
    String(rem%60).padStart(2,'0')
  ].join(':');
}

// ══════════════════════════════════════════
// RESTORE
// ══════════════════════════════════════════
function applyResult(res) {
  Object.values(ballEls).forEach(el => el.classList.add('locked','revealed'));
  const lA = balls.filter(b=>b.loc==='left').reduce((s,b)=>s+b.r*b.r,0);
  const rA = balls.filter(b=>b.loc==='right').reduce((s,b)=>s+b.r*b.r,0);
  cntL.textContent = fmt(Math.PI*lA);
  cntR.textContent = fmt(Math.PI*rA);
  if (res.won) {
    zoneL.classList.add('zone-win','revealed');
    zoneR.classList.add('zone-win','revealed');
  } else {
    (res.heavier==='left' ? zoneL : zoneR).classList.add('zone-heavy','revealed');
    (res.heavier==='left' ? zoneR : zoneL).classList.add('zone-light','revealed');
  }
  appEl.classList.add('game-over');
}

function restore() {
  const raw = localStorage.getItem(SKEY);
  if (!raw) return false;
  try {
    const res = JSON.parse(raw);
    res.lIds.forEach(id => { const b=balls.find(b=>b.id===+id); if(b) b.loc='left'; });
    res.rIds.forEach(id => { const b=balls.find(b=>b.id===+id); if(b) b.loc='right'; });
    dead = true;
    beamG.style.animation = 'none';
    if (!res.won) beamG.style.transform = res.heavier==='left' ? 'rotate(-9deg)' : 'rotate(9deg)';
    applyResult(res);
    requestAnimationFrame(() => { layoutAll(); setTimeout(()=>showResult(res), 250); });
    return true;
  } catch(e) { return false; }
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
balls.forEach(makeBall);
window.addEventListener('resize', () => { if (!drag) layoutAll(); });
requestAnimationFrame(() => {
  layoutAll();
  if (!restore()) refreshUI();
});
</script>
</body>
</html>
